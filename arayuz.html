<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>ariDoor - Arı Kovanı Kontrol</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f1a;
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 30px;
  }
  h1 { color: #f5a623; font-size: 28px; margin-bottom: 5px; }
  .subtitle { color: #888; margin-bottom: 30px; }

  /* Bağlantı */
  .btn-group { margin-bottom: 30px; }
  .connect-btn {
    background: #f5a623;
    color: #000;
    border: none;
    padding: 14px 40px;
    border-radius: 10px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
  }
  .connect-btn:hover { background: #ffb834; transform: scale(1.05); }
  .connect-btn.connected { background: #2ecc71; }
  .connect-btn.connected:hover { background: #27ae60; }
  .disconnect-btn {
    background: #e74c3c;
    color: #fff;
    border: none;
    padding: 14px 40px;
    border-radius: 10px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    margin-left: 10px;
    transition: all 0.2s;
    display: none;
  }
  .disconnect-btn:hover { background: #c0392b; transform: scale(1.05); }

  /* Ana Grid */
  .dashboard {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    max-width: 700px;
    width: 100%;
  }

  /* Kart */
  .card {
    background: #1a1a2e;
    border-radius: 16px;
    padding: 24px;
    border: 1px solid #2a2a4a;
  }
  .card-title {
    font-size: 13px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }
  .card-value {
    font-size: 42px;
    font-weight: bold;
  }
  .card-unit { font-size: 18px; color: #888; }
  .temp { color: #e74c3c; }
  .humidity { color: #3498db; }
  .no-data { color: #555; font-size: 24px; }

  /* Motor Kontrol */
  .motor-card {
    grid-column: 1 / -1;
    text-align: center;
  }
  .motor-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin: 20px 0;
  }
  .arrow-btn {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 2px solid #f5a623;
    background: transparent;
    color: #f5a623;
    font-size: 28px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .arrow-btn:hover { background: #f5a623; color: #000; }
  .arrow-btn:active { transform: scale(0.9); }
  .arrow-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .reset-btn {
    padding: 10px 24px;
    border-radius: 8px;
    border: 2px solid #e74c3c;
    background: transparent;
    color: #e74c3c;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
  }
  .reset-btn:hover { background: #e74c3c; color: #fff; }
  .reset-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .motor-position {
    font-size: 20px;
    color: #f5a623;
    margin-top: 10px;
  }
  .motor-mm { font-size: 32px; font-weight: bold; color: #fff; }

  /* Slider */
  .slider-container { margin-top: 15px; }
  .slider {
    -webkit-appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: #2a2a4a;
    outline: none;
  }
  .slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #f5a623;
    cursor: pointer;
  }
  .slider-labels {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #666;
    margin-top: 5px;
  }

  /* Log */
  .log-card { grid-column: 1 / -1; }
  .log {
    background: #0a0a15;
    border-radius: 8px;
    padding: 12px;
    height: 120px;
    overflow-y: auto;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: #666;
  }
  .log-entry { margin: 2px 0; }
  .log-entry.error { color: #e74c3c; }
  .log-entry.ok { color: #2ecc71; }
</style>
</head>
<body>

<h1>ariDoor</h1>
<p class="subtitle">Ari Kovani Kapi Surgu Kontrol Sistemi</p>

<div class="btn-group">
  <button class="connect-btn" id="connectBtn" onclick="baglan()">Arduino'ya Baglan</button>
  <button class="disconnect-btn" id="disconnectBtn" onclick="durdur()">Durdur ve Kes</button>
</div>

<div class="dashboard">
  <!-- Sıcaklık -->
  <div class="card">
    <div class="card-title">Kovan Sicakligi</div>
    <div class="card-value temp" id="sicVal">
      <span class="no-data">--</span>
    </div>
    <span class="card-unit">&deg;C</span>
  </div>

  <!-- Nem -->
  <div class="card">
    <div class="card-title">Kovan Nemi</div>
    <div class="card-value humidity" id="nemVal">
      <span class="no-data">--</span>
    </div>
    <span class="card-unit">%</span>
  </div>

  <!-- Motor Kontrol -->
  <div class="card motor-card">
    <div class="card-title">Surgu Kontrol</div>
    <div class="motor-controls">
      <button class="arrow-btn" id="solBtn" onclick="komutGonder('SOL')" disabled>&#9664;</button>
      <div>
        <div class="motor-mm" id="motorMm">0.0 mm</div>
        <div class="motor-position">Adim: <span id="motorAdim">0</span></div>
      </div>
      <button class="arrow-btn" id="sagBtn" onclick="komutGonder('SAG')" disabled>&#9654;</button>
    </div>
    <button class="reset-btn" id="sifirBtn" onclick="komutGonder('SIFIR')" disabled>Sifira Don</button>

    <div class="slider-container">
      <input type="range" class="slider" id="mmSlider" min="0" max="150" value="0"
             oninput="sliderDegisti(this.value)" disabled>
      <div class="slider-labels">
        <span>0 mm (Acik)</span>
        <span>75 mm</span>
        <span>150 mm (Kapali)</span>
      </div>
    </div>
  </div>

  <!-- Log -->
  <div class="card log-card">
    <div class="card-title">Seri Port Log</div>
    <div class="log" id="logDiv"></div>
  </div>
</div>

<script>
  let port, reader, writer;
  let bagli = false;

  const MM_PER_ADIM = 0.0153;

  async function baglan() {
    try {
      port = await navigator.serial.requestPort();
      await port.open({ baudRate: 9600 });

      const decoder = new TextDecoderStream();
      port.readable.pipeTo(decoder.writable);
      reader = decoder.readable.getReader();

      const encoder = new TextEncoderStream();
      encoder.readable.pipeTo(port.writable);
      writer = encoder.writable.getWriter();

      bagli = true;
      document.getElementById('connectBtn').textContent = 'Bagli';
      document.getElementById('connectBtn').classList.add('connected');
      document.getElementById('connectBtn').disabled = true;
      document.getElementById('disconnectBtn').style.display = 'inline-block';
      document.getElementById('solBtn').disabled = false;
      document.getElementById('sagBtn').disabled = false;
      document.getElementById('sifirBtn').disabled = false;
      document.getElementById('mmSlider').disabled = false;

      logEkle('Arduino baglantisi kuruldu', 'ok');
      serialOku();
    } catch (e) {
      logEkle('Baglanti hatasi: ' + e.message, 'error');
    }
  }

  async function serialOku() {
    let tampon = '';
    while (true) {
      try {
        const { value, done } = await reader.read();
        if (done) break;
        tampon += value;

        let satirlar = tampon.split('\n');
        tampon = satirlar.pop();

        for (let satir of satirlar) {
          satir = satir.trim();
          if (!satir) continue;
          logEkle(satir);

          try {
            const veri = JSON.parse(satir);
            guncelle(veri);
          } catch(e) {}
        }
      } catch (e) {
        logEkle('Okuma hatasi: ' + e.message, 'error');
        break;
      }
    }
  }

  async function komutGonder(komut) {
    if (!bagli) return;
    try {
      await writer.write(komut + '\n');
      logEkle('>> ' + komut, 'ok');
    } catch (e) {
      logEkle('Gonderme hatasi: ' + e.message, 'error');
    }
  }

  function sliderDegisti(mm) {
    if (!bagli) return;
    const hedefAdim = Math.round(mm / MM_PER_ADIM);
    komutGonder('GIT:' + hedefAdim);
  }

  function guncelle(veri) {
    if (veri.sic !== undefined && veri.sic !== null) {
      document.getElementById('sicVal').textContent = veri.sic.toFixed(1);
    }
    if (veri.nem !== undefined && veri.nem !== null) {
      document.getElementById('nemVal').textContent = veri.nem.toFixed(1);
    }
    if (veri.adim !== undefined) {
      document.getElementById('motorAdim').textContent = veri.adim;
      const mm = (veri.adim * MM_PER_ADIM).toFixed(1);
      document.getElementById('motorMm').textContent = mm + ' mm';
      document.getElementById('mmSlider').value = mm;
    }
  }

  function logEkle(mesaj, tip) {
    const div = document.getElementById('logDiv');
    const entry = document.createElement('div');
    entry.className = 'log-entry' + (tip ? ' ' + tip : '');
    const saat = new Date().toLocaleTimeString();
    entry.textContent = saat + ' ' + mesaj;
    div.appendChild(entry);
    div.scrollTop = div.scrollHeight;
  }

  async function durdur() {
    bagli = false;
    try {
      if (reader) { await reader.cancel().catch(()=>{}); reader = null; }
      if (writer) { await writer.close().catch(()=>{}); writer = null; }
      await new Promise(r => setTimeout(r, 300));
      if (port) { await port.close().catch(()=>{}); port = null; }
    } catch (e) {}

    document.getElementById('connectBtn').textContent = "Arduino'ya Baglan";
    document.getElementById('connectBtn').classList.remove('connected');
    document.getElementById('connectBtn').disabled = false;
    document.getElementById('disconnectBtn').style.display = 'none';
    document.getElementById('solBtn').disabled = true;
    document.getElementById('sagBtn').disabled = true;
    document.getElementById('sifirBtn').disabled = true;
    document.getElementById('mmSlider').disabled = true;

    logEkle('Baglanti kesildi - port serbest', 'error');
  }

  // Klavye kontrol
  document.addEventListener('keydown', (e) => {
    if (!bagli) return;
    if (e.key === 'ArrowLeft') { komutGonder('SOL'); e.preventDefault(); }
    if (e.key === 'ArrowRight') { komutGonder('SAG'); e.preventDefault(); }
    if (e.key === '0' || e.key === 'Home') { komutGonder('SIFIR'); e.preventDefault(); }
  });
</script>

</body>
</html>
